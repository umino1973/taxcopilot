<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaxCopilot Money Finder</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px;
}

h1 {
  margin-bottom: 10px;
}

textarea {
  width: 100%;
  min-height: 140px;
  padding: 15px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
}

button {
  margin-top: 15px;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.card {
  margin-top: 20px;
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  white-space: pre-wrap;
  min-height: 100px;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 TaxCopilot Money Finder</h1>
<p>Descrivi la tua idea e scopri opportunità e incentivi.</p>

<textarea id="idea" placeholder="Es: voglio aprire una ditta multiservizi a Como..."></textarea>

<button onclick="runAI()">Analizza</button>

<div id="output" class="card">
Pronto.
</div>

</div>

<script>
async function runAI() {

  const idea = document.getElementById("idea").value;
  const output = document.getElementById("output");

  if (!idea.trim()) {
    output.innerText = "Inserisci una descrizione.";
    return;
  }

  output.innerText = "Analisi in corso...";

  try {

    const response = await fetch(
  "/.netlify/functions/ai",
  {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ idea })
  }
);

    const data = await response.json();

    if (data.error) {
  output.innerText =
    "Errore API:\n\n" +
    JSON.stringify(data, null, 2);
  return;
}

    output.innerText = data.result || "Nessuna risposta";

  } catch (err) {
    output.innerText =
      "Errore API o connessione\n\nDettaglio: " + err.message;
  }
}
</script>

</body>
</html>
